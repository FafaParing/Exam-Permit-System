<!-- 7. EXAM PERIODS MODULE -->
<section id="periods" class="page-section">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-medium text-slate-700">Manage Exam Periods</h2>
        <button onclick="periods.openModal()" class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center shadow-sm">
            <i class="fa-solid fa-plus mr-2"></i> Add Period
        </button>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left text-slate-600">
                <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3">Period Name</th>
                        <th class="px-6 py-3">Semester</th>
                        <th class="px-6 py-3">Start Date</th>
                        <th class="px-6 py-3">End Date</th>
                        <th class="px-6 py-3">Status</th>
                        <th class="px-6 py-3 text-right">Control</th>
                    </tr>
                </thead>
                <tbody id="periods-table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>
</section>
