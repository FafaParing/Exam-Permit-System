<!-- 1. DASHBOARD -->
<section id="dashboard" class="page-section active">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
        <!-- Summary Cards -->
        <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100 flex items-center">
            <div class="p-3 rounded-full bg-brand-100 text-brand-600 mr-4"><i class="fa-solid fa-user-graduate text-xl"></i></div>
            <div>
                <p class="text-sm text-slate-500 font-medium">Total Students</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-total-students">0</h3>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100 flex items-center">
            <div class="p-3 rounded-full bg-purple-100 text-purple-600 mr-4"><i class="fa-solid fa-chalkboard-user text-xl"></i></div>
            <div>
                <p class="text-sm text-slate-500 font-medium">Total Teachers</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-total-teachers">0</h3>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100 flex items-center">
            <div class="p-3 rounded-full bg-amber-100 text-amber-600 mr-4"><i class="fa-solid fa-clock text-xl"></i></div>
            <div>
                <p class="text-sm text-slate-500 font-medium">Pending Promissory</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-pending-promissory">0</h3>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100 flex items-center">
            <div class="p-3 rounded-full bg-green-100 text-green-600 mr-4"><i class="fa-solid fa-check-circle text-xl"></i></div>
            <div>
                <p class="text-sm text-slate-500 font-medium">Cleared Students</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-cleared">0</h3>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100 flex items-center">
            <div class="p-3 rounded-full bg-red-100 text-red-600 mr-4"><i class="fa-solid fa-money-bill-wave text-xl"></i></div>
            <div>
                <p class="text-sm text-slate-500 font-medium">With Balance</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-with-balance">0</h3>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-100 flex items-center">
            <div class="p-3 rounded-full bg-indigo-100 text-indigo-600 mr-4"><i class="fa-solid fa-calendar-check text-xl"></i></div>
            <div>
                <p class="text-sm text-slate-500 font-medium">Active Exam Period</p>
                <h3 class="text-lg font-bold text-slate-800 truncate w-32" id="dash-active-period">None</h3>
            </div>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100">
            <h3 class="text-lg font-semibold text-slate-800">Recent Activity</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left text-slate-600">
                <thead class="text-xs text-slate-500 uppercase bg-slate-50">
                    <tr>
                        <th class="px-6 py-3">Timestamp</th>
                        <th class="px-6 py-3">Activity</th>
                        <th class="px-6 py-3">Details</th>
                    </tr>
                </thead>
                <tbody id="activity-log-body" class="divide-y divide-slate-100">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>
</section>
