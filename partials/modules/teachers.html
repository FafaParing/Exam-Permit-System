<!-- 3. TEACHERS MODULE -->
<section id="teachers" class="page-section">
    <div class="flex justify-between items-center mb-6">
        <input type="text" id="teacher-search" placeholder="Search teachers..."
            class="w-64 pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
        <button type="button" onclick="teachers.openAddModal()"
            class="px-4 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 transition-colors text-sm font-medium">
            + Add Teacher
        </button>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left text-slate-600">
                <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-3">ID</th>
                        <th class="px-6 py-3">Last Name</th>
                        <th class="px-6 py-3">First Name</th>
                        <th class="px-6 py-3">Status</th>
                        <th class="px-6 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody id="teachers-table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>
</section>

<!-- Add Teacher Modal -->
<div id="add-teacher-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md">

        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-xl">
            <h3 class="font-semibold text-lg">Add Teacher</h3>

            <button type="button" onclick="teachers.closeAddModal()" class="text-slate-400 hover:text-slate-600">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>

        <form onsubmit="teachers.saveTeacher(event)" class="p-6 space-y-4">

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">First Name</label>
                <input type="text" id="teacher-first-name" required
                    class="w-full border border-slate-300 rounded-lg px-3 py-2">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Last Name</label>
                <input type="text" id="teacher-last-name" required
                    class="w-full border border-slate-300 rounded-lg px-3 py-2">
            </div>



            <!---<div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Subject</label>
                <input type="text" id="teacher-subject" required
                    class="w-full border border-slate-300 rounded-lg px-3 py-2">
            </div>--->

            <div class="pt-2 flex justify-end space-x-3">
                <button type="button" onclick="teachers.closeAddModal()"
                    class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg">
                    Cancel
                </button>

                <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-lg">
                    Add Teacher
                </button>
            </div>

        </form>
    </div>
</div>
<div id="confirm-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">

        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm">

            <!-- Header -->
            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50 rounded-t-xl">
                <h3 class="font-semibold text-lg text-slate-800">Confirm Action</h3>
            </div>

            <!-- Body -->
            <div class="p-6">
                <p id="confirm-text" class="text-slate-700 text-sm">
                    Are you sure?
                </p>
            </div>

            <!-- Buttons -->
            <div class="px-6 py-4 flex justify-end space-x-3 border-t border-slate-100">

                <button id="confirm-no"
                    class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
                    Cancel
                </button>

                <button id="confirm-yes"
                    class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700">
                    Confirm
                </button>

            </div>

        </div>

    </div>
