<section id="verification-logs" class="page-section">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h3 class="text-2xl font-bold text-slate-900">Exam Verification Logs</h3>
                <p class="text-slate-600 text-sm mt-1">Records of QR code scans during exam proctoring</p>
            </div>
        </div>

        <!-- Verification Logs Table -->
        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Student Name</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Permit ID</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Exam Period</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Scanned At</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Teacher</th>
                        </tr>
                    </thead>
                    <tbody id="verification-logs-table-body">
                        <!-- Populated by verificationLogs.render() -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
            <div class="bg-gradient-to-br from-blue-50 to-blue-100 border border-blue-200 rounded-lg p-4">
                <div class="text-sm font-medium text-blue-600 mb-1">Total Scans</div>
                <div class="text-2xl font-bold text-blue-900" id="total-scans">0</div>
            </div>
            <div class="bg-gradient-to-br from-green-50 to-green-100 border border-green-200 rounded-lg p-4">
                <div class="text-sm font-medium text-green-600 mb-1">Today's Scans</div>
                <div class="text-2xl font-bold text-green-900" id="today-scans">0</div>
            </div>
            <div class="bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 rounded-lg p-4">
                <div class="text-sm font-medium text-purple-600 mb-1">Unique Students</div>
                <div class="text-2xl font-bold text-purple-900" id="unique-students">0</div>
            </div>
        </div>
    </div>
</section>
