<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Exam Permit Admin Portal</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind Config for Custom Colors -->
    <script src="./js/tailwind-config.js"></script>
</head>
<body
    class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4"
    style="background-image: url('./stibackground.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;"
>

    <div class="w-full max-w-sm">
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8">
            <div class="flex items-center justify-center mb-6">
                <img src="./stilogo.webp" alt="Logo" class="h-14 w-auto max-w-xs object-contain" loading="eager" decoding="async">
            </div>

            <h1 class="text-2xl font-bold text-slate-700 text-center">Exam Portal</h1>

            <form id="login-form" class="mt-8 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
                </div>

                <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
                    Please enter a username and password.
                </div>

                <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
                   Login
                </button>

                <p class="text-xs text-slate-500 text-center pt-2">
                    Administrators only. Unauthorized access is prohibited.
                </p>
            </form>
        </div>
    </div>

    <script src="./js/login.js" defer></script>
</body>
</html>
